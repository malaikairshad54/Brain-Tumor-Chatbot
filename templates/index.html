<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brain Tumor Medical Chatbot</title>
    <link rel="stylesheet" href="/static/style.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <!-- Sidebar -->
    <aside id="sidebar">
        <div class="logo">
            <i class="fas fa-brain"></i> NeuroBot AI
        </div>
        <button id="new-chat-btn" class="new-chat-btn">
            <i class="fas fa-plus"></i> New Chat
        </button>
        <div id="chat-list">
            <!-- Chat history items will appear here -->
        </div>
    </aside>

    <!-- Main Chat Area -->
    <main id="main-chat">
        <header class="chat-header">
            <h1>Brain Tumor Assistant</h1>
            <div class="status">
                <i class="fas fa-check-circle" style="color: #10b981;"></i> Online
            </div>
        </header>

        <div id="chat-box">
            <div class="container" id="message-container">
                <!-- Messages will be injected here -->
                <div class="message-wrapper bot">
                    <div class="avatar bot"><i class="fas fa-robot"></i></div>
                    <div class="message-content">
                        Hello! I am your AI Medical Assistant dedicated to brain tumor analysis and information. How can
                        I help you today?
                    </div>
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-container">
                <textarea id="user-input" placeholder="Type your medical question here..." rows="1"></textarea>
                <button id="send-btn" disabled>
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </main>

    <script>
        let currentChatId = null;
        const chatList = document.getElementById('chat-list');
        const messageContainer = document.getElementById('message-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const newChatBtn = document.getElementById('new-chat-btn');

        // Auto-resize textarea
        userInput.addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
            if (this.value.trim() !== "") {
                sendBtn.disabled = false;
            } else {
                sendBtn.disabled = true;
            }
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadChatList();
            // Start a new chat session automatically if no history is loaded
            // or just wait for user. Let's start fresh.
        });

        // --- API Interactions ---

        async function loadChatList() {
            try {
                const response = await fetch('/chats');
                const chats = await response.json();
                renderChatList(chats);
            } catch (error) {
                console.error("Failed to load chat list:", error);
            }
        }

        async function loadChatHistory(chatId) {
            if (currentChatId === chatId) return;

            try {
                const response = await fetch(`/chat/${chatId}`);
                const data = await response.json();

                currentChatId = data.id;
                renderMessages(data.messages);
                updateActiveChat(chatId);
            } catch (error) {
                console.error("Failed to load chat history:", error);
            }
        }

        async function createNewChat() {
            try {
                const response = await fetch('/new_chat', { method: 'POST' });
                const chat = await response.json();
                currentChatId = chat.id;
                messageContainer.innerHTML = ''; // Clear messages
                // Add welcome message
                appendMessage('bot', "Hello! I am your AI Medical Assistant dedicated to brain tumor analysis and information. How can I help you today?");
                loadChatList(); // Refresh list to show new chat (though it might be empty title initially)
                updateActiveChat(chat.id);
            } catch (error) {
                console.error("Failed to create new chat:", error);
            }
        }

        async function deleteChat(event, chatId) {
            event.stopPropagation(); // prevent triggering chat load
            if (!confirm("Are you sure you want to delete this chat?")) return;

            try {
                const response = await fetch(`/delete_chat/${chatId}`, { method: 'DELETE' });
                if (response.ok) {
                    // Update UI
                    if (currentChatId === chatId) {
                        currentChatId = null;
                        messageContainer.innerHTML = '';
                        appendMessage('bot', "Hello! I am your AI Medical Assistant dedicated to brain tumor analysis and information. How can I help you today?");
                    }
                    loadChatList();
                } else {
                    alert("Failed to delete chat.");
                }
            } catch (error) {
                console.error("Error deleting chat:", error);
            }
        }

        // --- UI Rendering ---

        function renderChatList(chats) {
            chatList.innerHTML = '';
            chats.forEach(chat => {
                const div = document.createElement('div');
                div.className = `chat-item ${chat.id === currentChatId ? 'active' : ''}`;
                const titleSpan = document.createElement('span');
                titleSpan.textContent = chat.title || "New Conversation";

                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'delete-chat-btn';
                deleteBtn.innerHTML = '<i class="fas fa-trash"></i>';
                deleteBtn.onclick = (e) => deleteChat(e, chat.id);

                div.appendChild(titleSpan);
                div.appendChild(deleteBtn);

                div.onclick = () => loadChatHistory(chat.id);
                chatList.appendChild(div);
            });
        }

        function updateActiveChat(chatId) {
            const items = chatList.querySelectorAll('.chat-item');
            items.forEach(item => item.classList.remove('active'));
            // Refetch list to ensure ID match if we just created it, 
            // but for now, simple highlighting might loop through children.
            // Better to just reload list if we want to be sure of titles.
            loadChatList().then(() => {
                // Find the correct item to highlight
                // This is a bit inefficient but ensures title updates (e.g. after first message)
                // A better way would be updating the DOM directly if we knew the element.
            });
        }

        function renderMessages(messages) {
            messageContainer.innerHTML = '';
            // If empty, show welcome
            if (messages.length === 0) {
                appendMessage('bot', "Hello! I am your AI Medical Assistant dedicated to brain tumor analysis and information. How can I help you today?");
                return;
            }

            messages.forEach(msg => {
                appendMessage(msg.sender, msg.text);
            });
            scrollToBottom();
        }

        function appendMessage(sender, text) {
            const wrapper = document.createElement('div');
            wrapper.className = `message-wrapper ${sender}`;

            const avatar = document.createElement('div');
            avatar.className = `avatar ${sender}`;
            avatar.innerHTML = sender === 'bot' ? '<i class="fas fa-robot"></i>' : '<i class="fas fa-user"></i>';

            const content = document.createElement('div');
            content.className = 'message-content';
            content.innerHTML = formatText(text); // Basic formatting

            if (sender === 'bot') {
                wrapper.appendChild(avatar);
                wrapper.appendChild(content);
            } else {
                wrapper.appendChild(content);
                wrapper.appendChild(avatar);
            }

            messageContainer.appendChild(wrapper);
            scrollToBottom();
        }

        function scrollToBottom() {
            const chatBox = document.getElementById('chat-box');
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function formatText(text) {
            // Simple markdown-like formatting for bold and newlines
            let formatted = text.replace(/\n/g, '<br>');
            formatted = formatted.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            return formatted;
        }

        // --- Interaction Handlers ---

        newChatBtn.addEventListener('click', createNewChat);

        sendBtn.addEventListener('click', sendMessage);

        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // Optimistic UI update
            appendMessage('user', text);
            userInput.value = '';
            userInput.style.height = 'auto'; // Reset height
            sendBtn.disabled = true;

            // Show typing indicator
            const typingWrapper = document.createElement('div');
            typingWrapper.className = 'message-wrapper bot typing';
            typingWrapper.innerHTML = `
                <div class="avatar bot"><i class="fas fa-robot"></i></div>
                <div class="message-content typing-indicator">
                    <span></span><span></span><span></span>
                </div>
            `;
            messageContainer.appendChild(typingWrapper);
            scrollToBottom();

            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        question: text,
                        chat_id: currentChatId
                    })
                });

                const data = await response.json();

                // Remove typing indicator
                messageContainer.removeChild(typingWrapper);

                if (data.error) {
                    appendMessage('bot', "Sorry, I encountered an error. Please try again.");
                } else {
                    appendMessage('bot', data.answer);
                    // Update current chat ID if it was null (first message of session)
                    if (!currentChatId || currentChatId !== data.chat_id) {
                        currentChatId = data.chat_id;
                    }
                    // Refresh chat list to update title/timestamp
                    loadChatList();
                }

            } catch (error) {
                console.error("Error sending message:", error);
                messageContainer.removeChild(typingWrapper);
                appendMessage('bot', "Error connecting to the server.");
            }
        }

    </script>
</body>

</html>
